 <!DOCTYPE html>
<html lang="en">
<head>
    <title>OnClick Event</title>
</head>
<body>

    <button onclick="changeText()">Click Me</button>
    <p id="text">Hello, User!</p>

    <script>
        function changeText() {
            document.getElementById("text").innerText = "Button Clicked!";
        }
    </script>

</body>
</html>
