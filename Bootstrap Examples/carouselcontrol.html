<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
  <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="container-fluid">



 <div class="carousel slide" id="banner" data-bs-ride="carousel">    <!-- to animate we use Jquery attribute that is data0bs-ride="carousel"  -->
    <div class="carousel-inner">
      <div class="carousel-item active"  data-bs-interval="2000">
        <img src="./images/nslide1.png">
      </div>

      <div class="carousel-item">
        <img src="./images/nslide2.png"   data-bs-interval="1000" class="w-100 d-block">
      </div>

      <div class="carousel-item"  data-bs-interval="2000">
        <img src="./images/nslide3.png">
      </div>

      <div class="carousel-item"  data-bs-interval="3000">
        <img src="./images/nslide4.png">
      </div>


    </div>




    <div>
       <button data-bs-target="#banner" data-bs-slide="prev" class="carousel-control-prev btn btn-dark">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button data-bs-target="#banner" data-bs-slide="next" class="carousel-control-next btn btn-dark">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>


  <div class="carousel-indicators">
    <button  class="active btn btn-dark" data-bs-slide-to="0" data-bs-target="#banner"></button>
    <button data-bs-slide-to="1" data-bs-target="#banner"></button>
    <button data-bs-slide-to="2" data-bs-target="#banner"></button>
    <button data-bs-slide-to="3" data-bs-target="#banner"></button>
   



  </div>




  </div>

  <script src="../node_modules/jquery/dist/jquery.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</body>
</html>
