<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
    <style>
        body {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 97vh;
  background-color: #020202;
}

#clock__container {
  position: relative;
  margin: auto;
  height: 40vw;  
  width: 40vw;
  min-height: 271px;
  min-width: 271px;
  max-height: 521px;
  max-width: 521px;
  background: url(../src/clock.png) no-repeat;
  background-size: 100%;
  border-radius: 50%;
  transition: all 521ms ease;
}

#hour,
#minute,
#second {
  position: absolute;
  border-radius: 10px;
  transform-origin: bottom;
  height: 0;
  transition: all 571ms ease-in-out;
  border: 1px solid black;
}

.hour {
  width: 1.8%;
  height: 25% !important;
  top: 25%;
  left: 48.85%;
  box-shadow: 0px 0px 2px 1px cyan;
  background: cyan;
}
.minute {
  width: 1.6%;
  height: 30% !important;
  top: 19%;
  left: 48.9%;
  box-shadow: 0px 0px 2px 1px white;
  background: white;
}
.second {
  width: 1%;
  height: 40% !important;
  top: 9%;
  left: 49.25%;
  box-shadow: 0px 0px 2px 1px tomato;
  background: tomato;
}

#center {
  background: white;
  border: 1px solid black;
  width: 3%;
  height: 3%;
  position: absolute;
  top: 48.2%;
  left: 48.2%;
  border-radius: 50%;
}

#clock__container:hover {
  animation: clock 4s infinite ease;
}

@keyframes clock {
  0% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 111px indigo,
      0px 15px 111px indigo;
  }
  10% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 71px purple,
      0px 15px 71px purple;
  }
  20% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 91px red,
      0px 15px 91px red;
  }
  30% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 51px orangered,
      0px 15px 51px orangered;
  }
  40% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 71px orange,
      0px 15px 71px orange;
  }
  50% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 111px yellow,
      0px 15px 111px yellow;
  }
  60% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 51px orange,
      0px 15px 51px orange;
  }
  70% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 71px orangered,
      0px 15px 71px orangered;
  }
  80% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 51px red,
      0px 15px 51px red;
  }
  90% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 71px purple,
      0px 15px 71px purple;
  }
  100% {
    box-shadow: inset 0px -15px 21px rgba(255, 255, 255, 0.2),
      inset 0px 15px 21px rgba(255, 255, 255, 0.2), 0px -15px 91px indigo,
      0px 15px 91px indigo;
  }
}
    </style>
    <title>Analog Clock</title>
  </head>
  <body>
    <div id="clock__container" class="clock__container--light">
   
      <div id="hour"></div>
      <div id="minute"></div>
      <div id="second"></div>
      <div id="center"></div>
    </div>
  </body>
  <script src="text.js">

//   const secondTime = date.getSeconds();

//   const hourRotation = 30 * hourTime + minuteTime / 2;
//   const minuteRotation = 6 * minuteTime;
//   const secondRotation = 6 * secondTime;

//   hour.style.transform = `rotate(${hourRotation}deg)`;
//   minute.style.transform = `rotate(${minuteRotation}deg)`;
//   second.style.transform = `rotate(${secondRotation}deg)`;
// }, 1000);

setInterval(() => {
  const date = new Date();
  const hourTime = date.getHours();
  const minuteTime = date.getMinutes();

  const hourRotation = 30 * hourTime + minuteTime / 2;

  hour.style.transform = `rotate(${hourRotation}deg)`;
}, 1000);

setTimeout(() => {
  setInterval(() => {
    const date = new Date();
    const minuteTime = date.getMinutes();

    const minuteRotation = 6 * minuteTime;

    minute.style.transform = `rotate(${minuteRotation}deg)`;
  }, 1000);
}, 500);

setTimeout(() => {
  setInterval(() => {
    const date = new Date();
    const secondTime = date.getSeconds();

    const secondRotation = 6 * secondTime;

    second.style.transform = `rotate(${secondRotation}deg)`;
  }, 1000);
}, 1000);

setTimeout(() => {
  document.getElementById("hour").classList.add("hour");
}, 500);
setTimeout(() => {
  document.getElementById("minute").classList.add("minute");
}, 1000);
setTimeout(() => {
  document.getElementById("second").classList.add("second");
}, 1500);
  </script>
</html>
