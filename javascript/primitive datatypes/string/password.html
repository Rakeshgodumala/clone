<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .valid{
      box-shadow: 5px 5px 5px green;
      border: green;

    }
    .invalid{
      box-shadow: 2px 2px 2px red;
      border: red;

    }
    .warning{
      box-shadow: 2px 2px 2px goldenrod;
      border: goldenrod;
    }
  </style>
</head>
<body>

  <fieldset>
    <legend>Verify Password</legend>
    Password: <input type="password" onkeyup="Verify()" id="txtpasw">
    <div id="msg"></div>
    
   
  
  </fieldset>
  

  <script>
    function Verify(){
      const password = document.getElementById("txtpasw");
      const msg = document.getElementById("msg")
      const regExp = /(?=.*[A-Z])\w{4,10}/;
      if(password.value.match(regExp)){
        msg.innerHTML="Strong Password".fontcolor("green").bold().italics();
        password.className="valid";
        console.log(password.className);
      }else {
        if(password.value.length<4){
          msg.innerHTML="Poor Password".fontcolor("red").bold()
        password.className="invalid";
        console.log(password.className);



        }else{
          msg.innerHTML="WEAK Password".fontcolor("gold").bold()
        password.className="warning";
        console.log(password.className);




        }
      }
    }
  </script>
</body>
</html>
