<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

</head>
<body>
  <h1 id="txt">Learning Javascript</h1>

  <script>
    let heading = document.getElementById("txt").textContent;
    document.write("slice = " + heading.slice(0,7)+ '<br>');  
    document.write("substring = " + heading.substring(0,7) + "<br>");
    document.write("substring = " + heading.substr(2,8) + "<br>");




    
  </script>
</body>
</html>
