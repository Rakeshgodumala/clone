<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>

    function bookclick(){

    
      var ticketsCount = document.getElementById("lstTickets").value;
            var total = parseInt(ticketsCount) * 240;
            document.write("Total Amount :" + total);
    }

  </script>
</head>

<body>
  <fieldset>
    <legend>Select Tickets - &#8377; 240/-</legend>   
     <select  id="lstTickets">
      <option value="">1</option>
      <option value="">2</option>
      <option value="">3</option>
      <option value="">4</option>
      <option value="">5</option>



    </select>

    <button onclick="bookclick()">Book</button>

  </fieldset>
</body>
</html>
