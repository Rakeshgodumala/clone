  <script>
    function CreateClick(){
      let btn = document.querySelector("#list").value;
      if(isNaN(btn)){
        document.querySelector("#msg").innerText="Please Enter a Number";
      }else{
         let result = parseInt(btn)*250;
      
      document.write(`Total Amount is ${result}`);
      }
    }
  </script>

<body>
  <h1 style="text-align: center" >Book my show</h1>
  <fieldset>
    <legend>Select Tickets</legend>

    <!-- <input type="text" id="txt"> -->
     <select id="list">
      <option>1</option>
      <option value="2">2</option>
      <option value="3">3</option>
     </select>
    <p id="msg"></p>
   
    <button onclick="CreateClick()">Select Tickets</button>
  </fieldset>

  
</body>
