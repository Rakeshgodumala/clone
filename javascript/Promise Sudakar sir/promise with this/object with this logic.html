 <script>
  


  let product = {
    "Name": "",
    "Brand":"",

     return this.Quantity * this.Price;
    },
    "Print":function(){
      document.write(`Name=${this.Name} <br> Brand Name=${this.Brand} <br> Price = ${this.Price} <br> Quantity= ${this.Quantity} <br>  Total Rupees= ${this.Total()}`)
    }
  }
  product.Name= prompt("Enter the Product Name");
  product.Brand = prompt("Please Enter the Brand Name");
  product.Price = parseFloat(prompt("Please Enter the price"));
  product.Quantity = parseInt(prompt("Please Enter the Quantity"));
  product.Print();

 </script>
