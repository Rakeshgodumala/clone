<script>
    function f1(){
        var x = 1;
        switch(x)
        {
            case 1:
            document.write("One");
            break;
            case 2:
            document.write("Two");
            break;
            case 3:
            document.write("Threes");
            break;
            default:
            document.write("Please Enter between 1 to 3");
            break;
        }
    }
    f1();
</script>
