<html>
    <head>
        <title>
            Selectors
        </title>
        <script>
           function bodyload(){
            document.querySelector("#pic").src="../public/images/banner.jpg";
            document.querySelector(".nam").value="Name Button";
           }


        </script>
        <style>
            .nam{
                margin-top: 30px;
                float:right;
                padding: 5px;
                font-weight:bold;
            }

        </style>
    </head>
    


    <body onload="bodyload()">
        <img id="pic" width="100%" height="40%">
        <form action="Get">
            <input type="button"   class="nam" >
        </form>

    </body>
</html>
