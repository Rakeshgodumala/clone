<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="index.css">


 
  <title>Buttons</title>
  


</head>
<body>
  <button class=" btn"    onclick="addquantity()" >    Add to Cart</button>

  <button class=" btn-del"   onclick="deletequantity()" >Move to White List</button>

  <button class=" btn"  onclick="addsaleby2()" >Add 1 + 1 sales</button>
  
  <h1 id="cart-summary"></h1>





  <script type="text/javascript">
    let cartQuantity = 0;
    document.querySelector('#cart-summary'). innerText=`Your Current item is ${cartQuantity}`;
  
function addquantity(){
  

  
  cartQuantity += 1;
  document.querySelector('#cart-summary'). innerText=`Your Current item is ${cartQuantity}`;
}

function deletequantity(){
  cartQuantity -- ;
  document.querySelector('#cart-summary'). innerText=`Your Current item is ${cartQuantity}`;
}


function addsaleby2(){
  cartQuantity += 2 ;
  document.querySelector('#cart-summary'). innerText=`Your Current item is ${cartQuantity}`;
}
  </script>


</body>
</html>
