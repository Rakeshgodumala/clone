<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function CreateClick(){
            x = prompt("Enter your name","");
            if(x == null){
                document.write("You Cancelled");
               

            }else if(x==""){
               document.write("Please Enter your Name");
           

            }else{
            document.querySelector("P").innerHTML+= "<font weight='bold' color='green'> Your Folder Successfully Created </font>"  + x +  "<br>";
            }
            
        }
    </script>
</head>

<body>
    
    <button onclick="CreateClick()">Folder Created</button>
    <P></P>
</body>
</html>
