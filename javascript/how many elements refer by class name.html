<html>
    <head>
        <title>Home</title>
        <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
        <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
        
        <script type="text/javascript">
            function bodyload(){
            
                x = document.getElementsByClassName("btn btn-info");                 
                alert("Total no. of elements using btn-info:" + x.length);
              
            }
         
        </script>



    </head>

    <body class="container-fluid" onload="bodyload()">

        <div>
            <img width="100" height="100" id="pic" border="1">
        </div>
        <form name="frmRegister">
            <h1>Register</h1>
            <input type="email">
            <input type="button" name="btn-Button" class="btn btn-info" id="btnButton"> 
        </form>
        <form name="frmLogin">
            <h1>Login</h1>
         
            <input type="email" >
            <input type="button"  class="btn btn-info"   name="btn-Login" id="btnLogin">
           
        </form>

     
</body>
</html>
