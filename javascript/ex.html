<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event</title>
    <script src="../node_modules/jquery/dist/jquery.js"></script>
    <script>
        $(function(){
            $("button").click(function(){
                $("#lblName").html($("#Name").val());
                $("#lblPrice").html($("#Price").val());
                $("#lblCity").html($("#City").val());
                if($("#Stock").prop("checked")==true) {
                    $("#lblStock").html("Avilable");
                } else {
                    $("#lblStock").html("Out of Stock");
                }
            })
        })
    </script>
</head>
<body>
    <dl>
        <dt>Name</dt>
        <dd><input type="text" id="Name"></dd>
        <dt>Price</dt>
        <dd><input type="text" id="Price"></dd>
        <dt>City</dt>
        <dd>
            <select id="City">
                <option>Delhi</option>
                <option>Hyd</option>
            </select>
        </dd>
        <dt>In Stock</dt>
        <dd><input type="checkbox" id="Stock" >Yes</dd>
    </dl>
    <button>Register</button>
    <hr>
    <h3>Details</h3>
    <dl>
        <dt>Name</dt>
        <dd id="lblName"></dd>
        <dt>Price</dt>
        <dd id="lblPrice"></dd>
        <dt>City</dt>
        <dd id="lblCity"></dd>
        <dt>Stock</dt>
        <dd id="lblStock"></dd>
    </dl>
</body>
</html>
