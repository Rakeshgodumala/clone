<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Event-Onclick</title>
  </head>
  <style>
    .btn{
      padding: 5px;
      font-weight: bold;
      font-size: 15px;
    }
  </style>
  <script type="text/javascript" for="para" event="onclick">
    confirm('Learning Javascript')t
    </script>

  
  <body>
    <p id="para"> Click on the below button</p>
  <input class="btn" type="button" value="Click here!" onclick="confirm('Hi, I am learning Javascript!')";>
    
  </body>
</html>
