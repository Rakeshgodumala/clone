<html>
    <head>
<title>Examples</title>
<style>
 
#user:valid+span{

display: none;
}
#user:invalid+span{
 background-color: rgba(212, 46, 46, 0.5)
}
#user:optional{
    border: 3px solid red;
}
#user:valid {
    border: 3px solid green;
}
#Age:in-range {
             border:1px solid green;
            
           }
  #Age:out-of-range {
             border:1px solid red;
           }
           #Age:in-range+div {
            
             display: none;
            
           }


</style>

        
    </head>
    <body>

       
      <dl>
        <dt>User:</dt>
        <dd> <input type="text" id="user" required pattern="\+91\d{10}" > <span>Mobile number starts with +91 </span>
        
      </dd>


      <dt>Age</dt>
      <dd>
        <input type="number" min="15" max="30" id="Age">
        <div style="color:red">
          Age 15 to 30 Only
        </div>
      </dd>
      <button>submit</button>
    </body>



</html>
