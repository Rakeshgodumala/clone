<!DOCTYPE html>
<html>
    <head>
        <title>Amazon Signin</title>
        <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
        <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
        <style>
            #box {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 400px;
               

            }
            form {
                width: 350px;
                border:2px solid gray;
                padding: 10px;
                border-radius: 10px;
               
                
            }

            #box form{
                margin-top: 10%;
            }
         
        </style>

     
    </head>
    <body class="container-fluid">
        <div id="box">
            <form>
                <h2>Sign-In</h2>
                <div class="mb-4">
                    <label class="form-label"><b>Email or mobile phone number</b></label>
                    <div>
                        <input type="email" class="form-control">
                    </div>
                </div>
                <div class="mb-4">
                    <button class="btn btn-warning w-100">Continue</button>
                </div>
                <div class="mb-4">
                    <p>By continuing, you agree to Amazon's Conditions of Use and Privacy Notice.</p>
                </div>
                <div class="mb-4">
                    <details>
                        <summary><a href="#">Need Help?</a></summary>
                        <dd><a href="#">Forgot Password</a></dd>
                        <dd><a href="#">Other Issues with signin</a></dd>
                    </details>
                </div>
                <div>
                    <hr>
                </div>
                <div class="mb-4">
                    <button class="btn btn-dark, w-100">
                        Create your Amazon account
                    </button>
                </div>
            </form>
        </div>


        
        <script src="../node_modules/jquery/dist/jquery.js"></script>
        <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>

    </body>
</html>
