<!DOCTYPE html>
<html>
<head>
  <title>Filters Example</title>
  <style>
    .filtered-image {
      width: 300px;
      height: auto;
      filter: grayscale(100%) blur(5px); /* Apply grayscale and blur filters */
    }
  </style>
</head>
<body>
  <h2>Image with Filters</h2>
  <img src="images/banner.jpg" alt="Example Image" class="filtered-image">
</body>
</html>
